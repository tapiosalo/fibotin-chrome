name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run tests (unit + E2E)
        # Extensions require a display; xvfb provides a virtual one.
        # --headless=new is avoided because some extension APIs behave
        # differently in headless mode; xvfb gives a real headed context.
        run: xvfb-run -a npm test
